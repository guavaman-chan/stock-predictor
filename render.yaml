services:
  - type: web
    name: stock-predictor-line-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn line_bot:app
    envVars:
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.6
